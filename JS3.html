<html>

<head>

</head>

<body>
    <script>
        var x = " hello ";
        document.write(x);
        document.write("<br>");
        document.write(typeof (x));
    </script>
    <br>
    <script>
        let y = 25;
        document.write(y);
        document.write("<br>");
        document.write(typeof (y));
        document.write(" ");
        document.write(typeof (typeof (y)));
    </script>
    <br>
    <script>
        let z = true;
        z = false;
        document.write(z);
        document.write("<br>");
        document.write(typeof (z));
    </script>
    <br>
    <script>
        let a = ["HTML", "CSS", "JS"];
        document.write(a);
        document.write("<br>");
        document.write(typeof (a));
    </script>
    <br>
    <script>
        let b = {
            first: "Hello",
            last: "Coder"
        };
        document.write(b);
        document.write("<br>");
        document.write(typeof (b));
    </script>
    <br>
    <script>
        var c = null;
        document.write(c);
        document.write("<br>");
        document.write(typeof (c));
    </script>
    <br>
    <script>
        var d;
        document.write(d);
        document.write("<br>");
        document.write(typeof (d));
    </script>
    <!-- '123' -->
    <br>
    <script>
        document.write(typeof (Number('123')));
        document.write("<br>");
        document.write(typeof (Number('hello')));
        document.write("<br>");
        document.write(typeof (String('hello')));
    </script>
</body>

</html>
