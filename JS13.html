<html>

<body>
    <script>
        function sum(math, eng, sc) {
            var s = math + eng + sc;
            return s;
        }

        function precentage(st) {
            var pre = st / 300 * 100;
            document.write(pre);
        }

        var total = sum(80, 80, 90);

        precentage(total);

        
        document.write("<br>");
        document.write(total);
    </script>
</body>

</html>
