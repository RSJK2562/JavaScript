<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function printtable()
        {
            var a = document.getElementById("t1").value;
            a = parseInt(a);

            for(var i=1; i<=10; i++)
            {
                document.getElementById("p1").innerHTML += i*a + "<br>";
            }

        }
    </script>
</head>
<body>
    Enter a number : <input type="text" id="t1">

    <button onclick="printtable()">Prin Table</button>
    
    <hr>

    <p id="p1"></p>
</body>
</html>
