<html>
    <head>
        <script>
            function getascii(){
                // var str = document.getElementById("t1").value;
                var str = t1.value;
                for( var i=0; i<str.length; i++){
                    var ascii = str.charCodeAt(i);
                    p1.innerHTML += ascii;
                    p1.innerHTML += "<br>";
                }
            }
        </script>
    </head>
    <body>
        Enter a String : <input type="text" id="t1">
        <button onclick="getascii()">ASCII</button>
        <br>
        <p id="p1"></p>
    </body>
</html>
